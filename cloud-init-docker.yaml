#cloud-config
# Installe Docker Engine + plugin compose via le depot apt officiel Docker
# (Debian). __ADMIN_USER__ est remplace par build_image.sh (render_cloud_init).
# IMPORTANT : ce fichier doit rester en ASCII pur. Le parseur YAML de cloud-init
# rejette les caracteres non-ASCII (ex: accents) apres le round-trip base64 de
# la custom-data Azure ("unacceptable character"), ce qui vide la config et fait
# sauter packages/runcmd (Docker non installe). Garde-fou : tests/test_build_image.sh.
package_update: true
packages:
  - ca-certificates
  - curl
  - gnupg
runcmd:
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - sh -c 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list'
  - apt-get update
  - DEBIAN_FRONTEND=noninteractive apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - usermod -aG docker __ADMIN_USER__
  - systemctl enable --now docker
